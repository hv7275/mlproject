<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f7f4ef;
            color: #0e0e14;
        }
        .card {
            width: min(92vw, 420px);
            padding: 28px;
            border: 1px solid #ddd9d2;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 4px 32px rgba(14, 14, 20, .08);
        }
        h1 { margin: 0 0 8px; }
        p { margin: 0 0 24px; color: #6f6a64; }
        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd9d2;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: #0e0e14;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .message {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .success { background: #eaf8ee; color: #236b36; }
        .error { background: #fff0ed; color: #9c321c; }
        .footer { margin-top: 18px; text-align: center; font-size: 14px; }
        a { color: #2a6dd4; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <main class="card">
        <h1>Register</h1>
        <p>Create an account to use the score predictor.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required>

            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="6" required>

            <button type="submit">Register</button>
        </form>

        <div class="footer">
            Already registered? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </main>
</body>
</html>
